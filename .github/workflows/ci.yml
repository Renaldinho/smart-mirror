name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  gesture-service-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install gesture-service dependencies
        working-directory: services/gesture-service
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run gesture-service tests
        working-directory: services/gesture-service
        env:
          PYTHONPATH: src
        run: pytest tests/unit tests/integration

  mmm-gesture-bridge-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install module dependencies
        working-directory: services/mmm-gesture-bridge
        run: npm ci
      - name: Run module tests
        working-directory: services/mmm-gesture-bridge
        run: npm test
